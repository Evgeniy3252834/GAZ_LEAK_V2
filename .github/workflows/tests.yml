name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender1 libgomp1 ffmpeg
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install opencv-python pillow numpy python-dotenv
          pip install fastapi uvicorn python-multipart
          pip install pytest pytest-cov
      
      - name: Download model
        run: |
          mkdir -p models
          pip install gdown
          gdown "https://drive.google.com/uc?id=1oPftKdKgtSaGc9__v9eoGHnhqM5JcHWk" -O models/thermal_model.pth
      
      - name: Create directories
        run: |
          mkdir -p data/input_videos data/processed data/results logs
      
      - name: Run tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=term --cov-report=xml
      
      - name: Display coverage summary
        run: |
          echo "========================================="
          echo "✅ Unit tests completed!"
          echo "📊 Coverage report above"
          echo "========================================="
