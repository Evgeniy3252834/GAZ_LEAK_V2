name: Unit Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install basic dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install numpy pillow python-dotenv

      - name: Run only stable unit tests (skip video & problematic API tests)
        run: |
          pytest tests/unit/test_batch_process.py \
                 tests/unit/test_detect_leak.py \
                 tests/unit/test_repository.py \
                 tests/unit/test_model_inference.py \
                 tests/unit/test_cli_simple.py \
                 tests/unit/test_imports.py \
                 tests/unit/test_entities.py \
                 tests/unit/test_serialization.py \
                 tests/unit/test_config_and_entities.py \
                 --cov=src --cov-report=term
